# .github/workflows/ci.yml
# FoodBridge CI — runs on every push to main or pull request
name: FoodBridge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: lint + install ───────────────────────────────
  backend:
    name: Backend — Lint & Install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Verify server starts
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          JWT_SECRET: ci_test_secret_not_real
          PORT: 5000
          NODE_ENV: test
        # Just check that the module loads without errors (no DB connection needed)
        run: node -e "require('./server.js')" &
        continue-on-error: true

  # ─── Frontend: lint + build ────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        env:
          VITE_API_URL: https://your-render-app.onrender.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  # ─── Docker build check ────────────────────────────────────
  docker:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t foodbridge-backend ./backend

      - name: Build frontend image
        run: docker build -t foodbridge-frontend ./frontend
